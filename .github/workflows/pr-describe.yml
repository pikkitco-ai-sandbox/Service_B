# PR Description Generator
#
# Inspired by gh-aw (GitHub Agentic Workflows) — auto-generates a structured
# summary comment on new PRs based on the diff. Read-only: adds a comment,
# never merges or modifies the PR.
#
# Pattern: keyword-based classification of changed files, not LLM-generated.
# This keeps the workflow deterministic and avoids LLM costs in CI.

name: PR Describe

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  describe:
    name: Auto-describe PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // Get changed files
            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            let files;
            try {
              files = execSync(`git diff --name-only ${base}...${head}`)
                .toString().trim().split('\n').filter(Boolean);
            } catch {
              files = [];
            }

            if (files.length === 0) {
              console.log('No files changed — skipping description.');
              return;
            }

            // Classify changes
            const areas = new Set();
            const details = [];

            for (const f of files) {
              if (f.startsWith('src/app/api/slack/'))  areas.add('💬 Slack Routes');
              if (f.startsWith('src/lib/backend/'))    areas.add('🔌 Backend Client');
              if (f.startsWith('src/lib/slack/'))      areas.add('📱 Slack SDK');
              if (f.startsWith('src/lib/state/'))      areas.add('💾 State Adapter');
              if (f.startsWith('src/lib/contracts/'))  areas.add('📐 Contracts');
              if (f.startsWith('contracts/'))          areas.add('📐 API Contract');
              if (f.startsWith('docs/adr/'))           areas.add('📋 Architecture Decisions');
              if (f.startsWith('tests/'))              areas.add('🧪 Tests');
              if (f.startsWith('.github/'))            areas.add('⚙️ CI/CD');
              if (f.endsWith('.md'))                   areas.add('📝 Documentation');
              if (f === 'AGENTS.md')                   areas.add('🤖 Agent Navigation');
            }

            const stat = execSync(`git diff --stat ${base}...${head}`)
              .toString().trim().split('\n');
            const summary = stat[stat.length - 1] || '';

            let body = `## 🤖 Auto-generated PR Summary\n\n`;
            body += `**${files.length} file(s) changed** — ${summary}\n\n`;

            if (areas.size > 0) {
              body += `### Areas Affected\n`;
              for (const area of areas) {
                body += `- ${area}\n`;
              }
              body += '\n';
            }

            body += `### Changed Files\n`;
            const maxFiles = 20;
            for (const f of files.slice(0, maxFiles)) {
              body += `- \`${f}\`\n`;
            }
            if (files.length > maxFiles) {
              body += `- ... and ${files.length - maxFiles} more\n`;
            }

            body += `\n---\n*Generated by PR Describe workflow — review and edit the PR description as needed.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });
            console.log('PR description comment posted.');
