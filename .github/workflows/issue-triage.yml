# Issue Triage Workflow
#
# Inspired by gh-aw (GitHub Agentic Workflows) — uses natural-language labels
# and safe-output patterns to auto-label and route new issues.
#
# Triggers: new issues opened in this repo
# Actions: apply classification labels based on keywords

name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    name: Auto-label new issues
    runs-on: ubuntu-latest
    steps:
      - name: Classify issue by title and body keywords
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text = `${issue.title} ${issue.body || ''}`.toLowerCase();

            const labels = [];

            // Service_B is the Slack gateway — classify by component
            if (text.match(/slack|event|mention|command|interaction/)) {
              labels.push('component:slack');
            }
            if (text.match(/backend|gateway|routing|contract|api/)) {
              labels.push('component:gateway');
            }
            if (text.match(/block.?kit|card|button|approval/)) {
              labels.push('component:blocks');
            }
            if (text.match(/state|redis|memory|adapter/)) {
              labels.push('component:state');
            }
            if (text.match(/vercel|deploy|serverless|edge/)) {
              labels.push('component:infra');
            }

            // Classification keywords (mirrors org-wide categories)
            if (text.match(/bug|error|crash|broken|fail|regression/)) {
              labels.push('bug');
            }
            if (text.match(/feature|request|suggestion|improve|would be nice/)) {
              labels.push('enhancement');
            }

            // Priority keywords
            if (text.match(/urgent|critical|p0|production.?down|outage/)) {
              labels.push('priority:critical');
            } else if (text.match(/high|important|p1/)) {
              labels.push('priority:high');
            }

            // Apply labels if any matched
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels,
              });
              console.log(`Applied labels: ${labels.join(', ')}`);
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-triage'],
              });
              console.log('No keyword match — applied needs-triage label');
            }
